name: Docker Build and Push

on:
  push:
    tags:
      - 'v*'           # build & push only when a tag like v1.2.3 is pushed
  workflow_dispatch:   # allow manual triggering

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive   # libwg/wireguard-go is needed to build libwg

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: nrt.vultrcr.com/wilinz
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          VERSION="${{ github.ref_name }}"
          docker buildx build --platform linux/amd64 \
            -t nrt.vultrcr.com/wilinz/corplink-rs:latest \
            -t nrt.vultrcr.com/wilinz/corplink-rs:"${VERSION}" \
            --push .
